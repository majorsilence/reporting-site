<header class="site-header">
  <div class="wrap">
    <a href="{{ site.baseurl }}/" class="site-brand">
      <span class="brand-icon">MR</span>
      Majorsilence Reporting
    </a>
    <nav class="site-nav">
      <a href="{{ site.baseurl }}/"{% if page.url == '/' %} class="nav-active"{% endif %}>home</a>
      <a href="https://github.com/majorsilence/Reporting/wiki" target="_blank" rel="noopener">docs</a>
      <a href="{{ site.baseurl }}/posts/"{% if page.navgroup == 'posts' %} class="nav-active"{% endif %}>blog</a>
      <a href="https://github.com/majorsilence/Reporting" target="_blank" rel="noopener" class="nav-cta">github ↗</a>
      <div class="theme-switcher" aria-label="Theme">
        <button class="theme-btn" data-theme="light" title="Light mode">light</button>
        <button class="theme-btn" data-theme="dark" title="Dark mode">dark</button>
        <button class="theme-btn" data-theme="system" title="System default">auto</button>
      </div>
    </nav>
  </div>
</header>
