safe: true
exclude:
  - README.md
  - Gemfile*
  - docker.sh
  - .gitattributes
  - .gitignore

# Blog specific settings
paginate_path: "posts/page/:num"
paginate: 5

# General settings
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      categories: [posts] # this is a slight hack so Jekyll generates the blog posts in /posts

highlighter: rouge
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

## The application virtual path
baseurl:
url: "https://reporting.majorsilence.com"
siteversion: 2026.06.10
title: Majorsilence Reporting
description: "An open-source RDL engine for .NET 8 & 10. Render PDF, Excel, HTML, CSV and more from SQL, JSON, or pure C#."

plugins: [jekyll-paginate, jekyll-redirect-from, jekyll-sitemap]
